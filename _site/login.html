<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Color - Acesso</title>
    <link rel="stylesheet" href="public/css/login-style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="tela-login-body">

    <div class="login-container">
      <div id="mensagem-erro" class="alerta-erro" style="display: none;"></div>
      <div
        id="mensagem-sucesso"
        class="alerta-sucesso"
        style="display: none;"
      ></div>

      <div id="bloco-login">
        <div class="login-header">
          <h2>Área de Acesso</h2>
          <p>Utilize suas credenciais para entrar</p>
        </div>

        <form id="loginForm">
          <div class="input-group">
            <label for="login-email">E-mail</label>
            <input
              type="email"
              id="login-email"
              placeholder="nome@exemplo.com"
              required
            />
          </div>

          <div class="input-group">
            <label for="login-senha">Senha</label>
            <input
              type="password"
              id="login-senha"
              placeholder="••••••••"
              required
            />
          </div>

          <button type="submit" class="btn-entrar">Entrar no Sistema</button>
        </form>

        <div class="alternar-tela">
          Não tem uma conta?
          <a href="#" id="link-ir-cadastro">Cadastre-se</a>
        </div>
      </div>

      <div id="bloco-cadastro" class="escondido">
        <div class="login-header">
          <h2>Criar Conta</h2>
          <p>Preencha os dados para se cadastrar</p>
        </div>

        <form id="cadastroForm">
          <div class="input-group">
            <label for="cad-email">E-mail de Usuário</label>
            <input
              type="email"
              id="cad-email"
              placeholder="seu-email@exemplo.com"
              required
            />
          </div>

          <div class="input-group">
            <label for="cad-senha">Escolha uma Senha</label>
            <input
              type="password"
              id="cad-senha"
              placeholder="Mínimo 6 caracteres"
              minlength="6"
              required
            />
          </div>

          <button type="submit" class="btn-entrar btn-cadastro">Finalizar
            Cadastro</button>
        </form>

        <div class="alternar-tela">
          Já tem uma conta?
          <a href="#" id="link-ir-login">Fazer Login</a>
        </div>
      </div>
    </div>

    <script src="public/js/login-logica.js"></script>
</body>
</html>
  </body>
</html>
